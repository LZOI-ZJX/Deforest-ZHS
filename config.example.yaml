# 复制为 config.yaml 再填写自己的值：
#   Windows PowerShell:  Copy-Item config.example.yaml config.yaml
#   macOS / Linux:       cp config.example.yaml config.yaml

# DeepSeek API（OpenAI 兼容）
deepseek:
  # 将下面的占位符替换为你自己的 key（以 sk- 开头），或改为从环境变量读取。
  api_key: "sk-REPLACE_WITH_YOUR_DEEPSEEK_API_KEY"
  base_url: "https://api.deepseek.com"
  model: "deepseek-chat"

# 路径（默认由代码解析到 Deforest-ZHS 项目内 cache/；截图默认文件名见 utils.paths）
paths:
  cache_dir: "./cache"

# 浏览器（CDP 远程调试端口，需与 Chrome 启动参数 --remote-debugging-port 一致）
browser:
  headless: false
  cdp_port: 9222
  # Windows：手动启动 Chrome 时与本项目配合的「浏览器目标」示例（程序不解析下列注释，仅作文档）
  # 用户数据目录固定到本仓库下的 chomepic（已在 .gitignore 中忽略），使用 Windows 反斜杠路径：
  #   D:\tools\fuckxjp\Deforest-ZHS\chomepic
  # 推荐命令（Chrome 安装路径请按本机实际调整）：
  # "C:\Program Files\Google\Chrome\Application\chrome.exe" --remote-debugging-port=9222 --user-data-dir="D:\tools\fuckxjp\Deforest-ZHS\chomepic"

# 考试流程（可选）
exam:
  # DOM 无法解析总题数时的兜底值
  default_total_questions: 10
  # 是否自动提交；未配置则默认 true；命令行 --no-submit 可强制关闭
  submit: true
  # go_back 失败时用于恢复「作业/考试列表」页；可选
  # list_page_url: "https://example.com/your-course-exam-list"
